<script id="photoTemplate" type="text/x-handlebars-template">
  <img src="https://webetu.iutnc.univ-lorraine.fr{{photo.url.href}}" alt="{{photo.titre}}">
  <h4>{{photo.titre}}</h4>
  <p>{{photo.descr}}</p>
  <p>{{photo.type}}, {{photo.width}} x {{photo.height}}</p>
  <h4 id="la_categorie"></h4>
  <p id="categorie_descr"></p>
  <h4>commentaires :</h4>
  <ul id="les_commentaires"></ul>
</script>

<script id="galleryTemplate" type="text/x-handlebars-template">
{{#each photos}}
  <div class="vignette" data-photo-id="{{this.photo.id}}">
      <img src="https://webetu.iutnc.univ-lorraine.fr{{photo.thumbnail.href}}" alt="{{photo.titre}}">
      <h4>{{this.photo.titre}}</h4>
  </div>
{{/each}}
</script>

<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
